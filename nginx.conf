worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Timeouts for slow upstream responses
    proxy_connect_timeout 30s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Larger proxy buffers to prevent "upstream response is buffered to a temporary file" warnings
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    upstream backend {
        server 127.0.0.1:3300;
    }

    upstream frontend {
        server 127.0.0.1:3000;
    }

    server {
        listen NGINX_PORT;

        # --- NextAuth routes (must go to Next.js, NOT Express backend) ---
        location /api/auth/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        # --- Backend API routes ---
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        # --- Health check (Railway healthcheck) ---
        location = /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # --- Backend static files (images, videos) ---
        location /images/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /videos/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # --- Swagger docs ---
        location /api/docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # --- Everything else -> Next.js frontend ---
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
