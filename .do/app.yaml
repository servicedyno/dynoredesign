# =============================================================================
# DigitalOcean App Platform spec for DynoPay  (branch: onboarding)
# =============================================================================
# Single combined service built from the repo-root `Dockerfile`:
#   nginx (listens on $PORT) ──┬─ /api/*           -> Express backend  (127.0.0.1:3300)
#                              ├─ /api/auth/*       -> Next.js (NextAuth) (127.0.0.1:3000)
#                              ├─ /health /images/* /videos/* /api/docs -> backend
#                              └─ everything else   -> Next.js frontend (127.0.0.1:3000)
#
# HOW TO USE
#   1) Edit `services[0].github.repo` + `branch` below (or create the app via the
#      DO UI: Apps -> Create -> GitHub -> pick repo + `onboarding` branch; DO will
#      auto-detect the Dockerfile, then paste these env vars in the dashboard).
#   2) Replace EVERY value marked REPLACE_ME in the DO dashboard (Settings ->
#      App-Level Env Vars). Values with type: SECRET are stored encrypted by DO.
#      DO NOT commit real secret values to git.
#   3) Deploy:  doctl apps create --spec .do/app.yaml      (or via the UI importer)
#
# IMPORTANT SCOPE NOTE
#   NEXT_PUBLIC_* and NEXTAUTH_* are inlined into the frontend bundle at BUILD time,
#   so they MUST have scope BUILD_TIME (or RUN_AND_BUILD_TIME) and be set BEFORE the
#   build runs. The root Dockerfile only declares build ARGs for: NEXT_PUBLIC_BASE_URL,
#   NEXT_PUBLIC_CYPHER_KEY, NEXT_PUBLIC_GOOGLE_CLIENT_ID, NEXT_PUBLIC_GOOGLE_CLIENT_SECRET,
#   NEXTAUTH_URL, NEXTAUTH_SECRET. If your frontend also reads NEXT_PUBLIC_SERVER_URL /
#   NEXT_PUBLIC_API_DOCS_URL at build, add matching ARG/ENV lines to the Dockerfile.
# =============================================================================

name: dynopay-onboarding
region: nyc            # change to your preferred DO region (nyc, fra, sfo, sgp, ...)

services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: REPLACE_ME/your-dynopay-repo   # e.g. moxxcompany/dynopay
      branch: onboarding
      deploy_on_push: true
    http_port: 8001                        # nginx listens here (matches PORT below)
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb   # >=1GB recommended; bump to 2GB if build OOMs
    health_check:
      http_path: /health
      initial_delay_seconds: 90
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3

    envs:
      # ---------- Core runtime ----------
      - { key: NODE_ENV, value: "production", scope: RUN_AND_BUILD_TIME }
      - { key: PORT, value: "8001", scope: RUN_AND_BUILD_TIME }
      - { key: API_SERVICE_PORT, value: "3301", scope: RUN_TIME }
      - { key: INTERNAL_BACKEND_URL, value: "http://localhost:3300", scope: RUN_TIME }
      - { key: ENABLE_BACKGROUND_JOBS, value: "true", scope: RUN_TIME }
      - { key: SKIP_MERCHANT_POOL_VALIDATION, value: "true", scope: RUN_AND_BUILD_TIME }

      # ---------- Public app URLs (set to your DO app domain / custom domain) ----------
      - { key: SERVER_URL, value: "https://REPLACE_ME.ondigitalocean.app", scope: RUN_TIME }
      - { key: FRONTEND_URL, value: "https://REPLACE_ME.ondigitalocean.app", scope: RUN_TIME }
      - { key: CHECKOUT_URL, value: "https://REPLACE_ME.ondigitalocean.app", scope: RUN_TIME }

      # ---------- Frontend BUILD-TIME vars (inlined into Next.js bundle) ----------
      - { key: NEXT_PUBLIC_BASE_URL, value: "https://REPLACE_ME.ondigitalocean.app/", scope: BUILD_TIME }
      - { key: NEXT_PUBLIC_SERVER_URL, value: "https://REPLACE_ME.ondigitalocean.app", scope: BUILD_TIME }
      - { key: NEXT_PUBLIC_API_DOCS_URL, value: "https://REPLACE_ME.ondigitalocean.app/api/docs", scope: BUILD_TIME }
      - { key: NEXT_PUBLIC_CYPHER_KEY, value: "REPLACE_ME", scope: BUILD_TIME, type: SECRET }
      - { key: NEXT_PUBLIC_GOOGLE_CLIENT_ID, value: "REPLACE_ME", scope: BUILD_TIME }
      - { key: NEXT_PUBLIC_GOOGLE_CLIENT_SECRET, value: "REPLACE_ME", scope: BUILD_TIME, type: SECRET }
      - { key: NEXTAUTH_URL, value: "https://REPLACE_ME.ondigitalocean.app", scope: BUILD_TIME }
      - { key: NEXTAUTH_SECRET, value: "REPLACE_ME", scope: BUILD_TIME, type: SECRET }

      # ---------- Database (PostgreSQL) ----------
      - { key: HOST, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: DB_PORT, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: DB_NAME, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: USER_NAME, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: PASSWORD, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: DB_SSL_REJECT_UNAUTHORIZED, value: "false", scope: RUN_TIME }

      # ---------- Redis ----------
      - { key: REDIS_PUBLIC_URL, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }

      # ---------- Auth / app secrets ----------
      - { key: ACCESS_TOKEN, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: ACCESS_TOKEN_SECRET, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: API_SECRET, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: CYPHER_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: ADMIN_EMAIL, value: "REPLACE_ME", scope: RUN_TIME }

      # ---------- Binance (rates / conversion) ----------
      - { key: BINANCE_API_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: BINANCE_API_SECRET, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: BINANCE_SECRET_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: BINANCE_BASE_URL, value: "https://api.binance.com", scope: RUN_TIME }
      - { key: BINANCE_CONVERT_INTERVAL_MINUTES, value: "10", scope: RUN_TIME }
      - { key: BINANCE_PROXY_URL, value: "socks5://127.0.0.1:1080", scope: RUN_TIME }

      # ---------- Outbound SSH tunnel (used by Binance proxy) ----------
      - { key: SSH_TUNNEL_HOST, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: SSH_TUNNEL_USER, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: SSH_TUNNEL_PASS, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: SSH_TUNNEL_LOCAL_PORT, value: "1080", scope: RUN_TIME }

      # ---------- Blockchain infra: Tatum / Blockchair / BlockBee ----------
      - { key: TATUM_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: TATUM_SECRET_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: TATUM_TESTNET, value: "false", scope: RUN_TIME }
      - { key: TATUM_TESTNET_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: TATUM_TESTNET_TYPE, value: "bitcoin-testnet", scope: RUN_TIME }
      - { key: TATUM_WEBHOOK_SECRET, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: BLOCKCHAIR_API_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: BLOCK_BEE_API_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }

      # ---------- FX / Tax ----------
      - { key: FAST_FOREX_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: FASTFOREX_API_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: TAX_DATA_API_URL, value: "https://api.apilayer.com/tax_data", scope: RUN_TIME }
      - { key: TAX_DATA_API_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }

      # ---------- Flutterwave (card/bank rails) ----------
      - { key: FLW_PUBLIC_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: FLW_SECRET_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: FLW_SECRET_HASH, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: FLW_ENCRYPTION_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }

      # ---------- CORS ----------
      - { key: CORS_ALLOWED_ORIGINS, value: "https://dynopay.com,https://checkout.dynopay.com", scope: RUN_TIME }

      # ---------- Worker Role (Multi-Environment Isolation) ----------
      - { key: WORKER_ROLE, value: "primary", scope: RUN_TIME }

      # ---------- Email / SMS / Messaging ----------
      - { key: BREVO_API_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: BREVO_SENDER_EMAIL, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: TELEGRAM_BOT_TOKEN, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: TELNYX_API_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: TELNYX_VERIFY_PROFILE_ID, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: TELNYX_PHONE_NUMBER, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: INFOBIP_API_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }

      # ---------- KYC (Veriff) ----------
      - { key: VERIFF_API_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: VERIFF_API_SECRET, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }

      # ---------- Google Cloud KMS (wallet key management) ----------
      - { key: PROJECT_ID, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: LOCATION_ID, value: "global", scope: RUN_TIME }
      - { key: KEY_RING_ID, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: PRIVATE_KEY_ID, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: TEMP_KEY_ID, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: XPUB_KEY_ID, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: GOOGLE_CLIENT_EMAIL, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      # GOOGLE_CLIENT_KEY is a multi-line PEM private key — paste it in the DO dashboard
      # as a SECRET (keep the \n escapes exactly as in your .env). Do NOT commit it.
      - { key: GOOGLE_CLIENT_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: CUSTOMER_ID, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: PROFILE_ID, value: "REPLACE_ME", scope: RUN_TIME }

      # ---------- Web Push Notifications (VAPID) ----------
      - { key: VAPID_PUBLIC_KEY, value: "REPLACE_ME", scope: RUN_TIME }
      - { key: VAPID_PRIVATE_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: VAPID_SUBJECT, value: "mailto:support@dynopay.com", scope: RUN_TIME }

      # ---------- Alerting (optional — leave empty to skip) ----------
      - { key: SLACK_WEBHOOK_URL, value: "", scope: RUN_TIME }
      - { key: DISCORD_WEBHOOK_URL, value: "", scope: RUN_TIME }

      # ---------- (Optional) legacy crypto gateway keys ----------
      - { key: CRYPTO_PUBLIC_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }
      - { key: CRYPTO_SECRET_KEY, value: "REPLACE_ME", scope: RUN_TIME, type: SECRET }

      # =========================================================================
      # On-chain wallet / treasury config (business-specific). Set to YOUR wallets.
      # Token CONTRACT addresses below are public network constants and can stay as-is.
