      - { key: RLUSD_ISSUER, value: "REPLACE_ME", scope: RUN_TIME }

      # --- Token contract addresses (public network constants — safe to keep) ---
      - { key: ETH_CONTRACT, value: "0xdac17f958d2ee523a2206206994597c13d831ec7", scope: RUN_TIME }
